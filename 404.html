<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Anwar Ali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-background text-foreground antialiased">
    <div class="flex min-h-screen items-center justify-center bg-gradient-to-br from-background to-secondary/20 p-4">
        <div class="text-center">
            <div class="mb-8">
                <i data-lucide="search-x" class="w-24 h-24 mx-auto text-primary/50"></i>
            </div>
            <h1 class="mb-4 text-6xl font-bold text-foreground">404</h1>
            <p class="mb-4 text-2xl text-muted-foreground">Oops! Page not found</p>
            <p class="mb-8 text-muted-foreground max-w-md mx-auto">
                The page you're looking for doesn't exist or has been moved.
            </p>
            <a href="index.html"
                class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground hover:bg-primary/90 h-11 rounded-md px-8">
                <i data-lucide="home" class="w-4 h-4 mr-2"></i>
                Return to Home
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
